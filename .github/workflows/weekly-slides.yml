name: Weekly Slides

on:
  schedule:
    - cron: '30 10 * * 5'  # 10:30 UTC (= 11:30 BST, summer)
    - cron: '30 11 * * 5'  # 11:30 UTC (= 11:30 GMT, winter)
    - cron: '0 17 * * 5'   # 17:00 UTC (= 18:00 BST, summer) – announce mode
    - cron: '0 18 * * 5'   # 18:00 UTC (= 18:00 GMT, winter) – announce mode
  workflow_dispatch:
    inputs:
      force_reset:
        description: 'Wipe saved state and start a fresh round'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      bot_mode:
        description: 'Bot operation mode'
        required: false
        default: 'slides'
        type: choice
        options:
          - 'slides'
          - 'announce'

concurrency:
  group: guess-chat
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check UK time (DST guard) and set bot mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — skipping DST time check."
            MODE="${{ github.event.inputs.bot_mode }}"
            echo "BOT_MODE=${MODE:-slides}" >> "$GITHUB_ENV"
            exit 0
          fi
          UK_HOUR=$(TZ='Europe/London' date +%H)
          echo "Current UK hour: $UK_HOUR"
          if [ "$UK_HOUR" = "11" ]; then
            echo "BOT_MODE=slides" >> "$GITHUB_ENV"
          elif [ "$UK_HOUR" = "18" ]; then
            echo "BOT_MODE=announce" >> "$GITHUB_ENV"
          else
            echo "Not a valid UK scheduled hour — skipping this run."
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: Checkout repository
        if: env.SKIP != 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        if: env.SKIP != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: env.SKIP != 'true'
        run: pip install -r requirements.txt

      - name: Write Google credentials
        if: env.SKIP != 'true'
        run: echo '${{ secrets.GOOGLE_OAUTH_TOKEN }}' > service_account.json

      - name: Load state from state branch
        if: env.SKIP != 'true'
        run: |
          git fetch origin state 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/state; then
            git show origin/state:state.json > state.json 2>/dev/null || true
            echo "Loaded state.json from state branch."
          else
            echo "No state branch found; starting fresh."
          fi

      - name: Reset state (force_reset)
        if: env.SKIP != 'true' && github.event.inputs.force_reset == 'true'
        run: |
          rm -f state.json
          echo "State wiped by force_reset."

      - name: Run bot
        if: env.SKIP != 'true'
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_RESULTS_CHANNEL_ID: ${{ secrets.DISCORD_RESULTS_CHANNEL_ID }}
          DISCORD_MOD_CHANNEL_ID: ${{ secrets.DISCORD_MOD_CHANNEL_ID }}
          BOT_MODE: ${{ env.BOT_MODE }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          TEMPLATE_DECK_ID: ${{ secrets.TEMPLATE_DECK_ID }}
          GOOGLE_CREDS_FILE: service_account.json
        run: python weekly_slides_bot.py

      - name: Save state to state branch
        if: env.SKIP != 'true'
        run: |
          if [ ! -f state.json ]; then
            echo "No state.json produced; nothing to save."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Work in a temporary directory to avoid touching the main checkout
          TMPDIR=$(mktemp -d)
          cp state.json "$TMPDIR/state.json"

          git fetch origin state 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/state; then
            git worktree add "$TMPDIR/state-branch" origin/state
          else
            git worktree add --orphan -b state "$TMPDIR/state-branch"
          fi

          cp "$TMPDIR/state.json" "$TMPDIR/state-branch/state.json"
          cd "$TMPDIR/state-branch"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push origin HEAD:state
